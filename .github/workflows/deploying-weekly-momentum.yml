name: Weekly Momentum Deploy
run-name: ${{ github.actor }} is running the weekly momentum rebalance.

on:
  schedule: ## Friday 21:30 UTC = after US close year-round; DAY orders queue for Monday open
    - cron: '30 21 * * 5'
  workflow_dispatch:        # Allows manual trigger

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}
      PAPER: True   # flip to False ONLY after months of paper validation

    steps:
      - name: Checkout repo (shallow)
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal dependencies
        run: |
          python -m pip install -U pip
          # This strategy needs only these (no torch/sklearn) - fast CI runs
          pip install --no-cache-dir --prefer-binary \
            pandas numpy yfinance lxml requests alpaca-py python-dotenv holidays

      - name: Run weekly momentum rebalance
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python main/deploy_weekly_momentum.py --execute

      - name: Extract latest run summary
        if: always()
        run: |
          # Grab everything from the most recent run header to end of file
          # so the email reports only this run's balance and movements.
          start=$(grep -n "weekly momentum rebalance" live_weekly_momentum.md | tail -1 | cut -d: -f1)
          if [ -n "${start}" ]; then
            tail -n +"${start}" live_weekly_momentum.md > latest_weekly_momentum.md
          else
            cp live_weekly_momentum.md latest_weekly_momentum.md
          fi
          cat latest_weekly_momentum.md

      - name: Send report as email body
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          subject:        "Weekly Momentum Rebalance Report"
          from:           ${{ secrets.SMTP_USERNAME }}
          to:             ${{ secrets.SMTP_USERNAME }}
          content_type:   text/plain
          body:           file://latest_weekly_momentum.md

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_weekly_momentum.md || true
          git add src/data/nasdaq100_snapshot.csv src/data/sp500_snapshot.csv || true
          git commit -m "Weekly momentum rebalance report [skip ci]" || echo "nothing to commit"
          git push || true
